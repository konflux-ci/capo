codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        informational: true

ignore:
  - "testdata/**"
  - "docs/**"
  - "internal/testutils/**"

flags:
  unit-tests:
    carryforward: true
  integration-tests:
    carryforward: true

comment:
  layout: "reach,diff,flags,files,footer"
  require_changes: true
