name: Integration Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  integration:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'

    # TODO: once buildah >= 1.44.0 is available in ubuntu repos, rollback this file to state 
    # of this commit: https://github.com/konflux-ci/capo/commit/80cc28d7b9396021d468e9e42b3d687085ad6ad8
    #- name: Install buildah
    #  run: |
    #    sudo apt-get update
    #    sudo apt-get install -y buildah

    - name: Install mage
      run: go install github.com/magefile/mage@latest

    - name: Download dependencies
      run: mage tidy

    - name: Install buildah build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgpgme-dev libseccomp-dev

    - name: Set up Go for buildah build
      uses: actions/setup-go@v6
      with:
        # Buildah requires Go >= 1.25.5. Remove this step once custom buildah build is no longer needed.
        go-version: '1.25.5'

    - name: Build custom buildah with intermediate image labeling support
      run: mage BuildCustomBuildah

    - name: Restore Go version for capo
      uses: actions/setup-go@v6
      with:
        go-version-file: 'go.mod'

    - name: Run integration tests
      run: mage IntegrationTest
