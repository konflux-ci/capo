version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: capo
    binary: capo
    dir: ./cmd/capo
    ldflags:
      - -s -w -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser -X main.Version={{.Version}} -X main.Revision={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - ppc64le
    tags:
      - exclude_graphdriver_btrfs
    hooks:
      post:
        - upx -9 "{{ .Path }}"

  - id: buildprobe
    binary: buildprobe
    dir: ./cmd/buildprobe
    ldflags:
      - -s -w -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser -X main.Version={{.Version}} -X main.Revision={{.ShortCommit}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - ppc64le
    tags:
      - exclude_graphdriver_btrfs
    hooks:
      post:
        - upx -9 "{{ .Path }}"

archives:
  - name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: binary

checksum:
  name_template: "{{ .ArtifactName }}_{{ .Version }}--checksums.txt"
  split: true

release:
  draft: false

changelog:
  sort: asc
  filters:
    include:
      - "^feat"
      - "^fix"
      - "^chore"
